# Cross-platform release builds.
#
# Triggered by pushing a tag of the form `v*` (e.g. `v0.1.0`). Builds
# the macOS (.dmg, arm64 + x64) and Windows (.exe, x64) installers on
# GitHub-hosted runners, then aggregates the artifacts into a DRAFT
# GitHub Release. The release stays in draft so you can verify each
# installer works before publishing — one click on the Releases page.
#
# `workflow_dispatch` is also enabled so you can smoke-test the pipeline
# on demand without tagging. That path skips the release-creation step;
# installers are available as downloadable artifacts on the run page.
#
# No code signing yet on any platform:
#   - macOS: ad-hoc signed (identity: '-' in electron-builder.yml).
#     Users need to right-click → Open the first time, but TCC remembers
#     camera/mic consent thanks to the stable ad-hoc identity.
#   - Windows: unsigned. SmartScreen shows "Unrecognized app" until the
#     first few hundred installs build reputation, or we buy an EV cert.
#   - Linux: AppImage, no signing convention — users `chmod +x` and run.
#     On Wayland sessions (modern Ubuntu/Fedora) screen capture prompts
#     via xdg-desktop-portal once per session; X11 captures silently.
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      # Don't cancel a mac build just because windows failed (or vice
      # versa) — we want to know whether each platform is healthy.
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm ci enforces package-lock.json; any drift between lockfile
      # and package.json fails the build, which is what we want for a
      # release. It also skips devDeps' optional prebuilds where possible.
      - run: npm ci

      - name: Vite + tsc build
        run: npm run build

      - name: electron-builder (${{ matrix.platform }})
        shell: bash
        # --publish=never is load-bearing: without it, electron-builder
        # sees the tag context + a GH_TOKEN and tries to create the
        # GitHub Release itself. The build job only has default
        # (read-only) `contents` permission, so that POST fails with
        # 403 Forbidden. We want the dedicated `release` job below to
        # create the Release via softprops — which has `contents: write`
        # — so tell electron-builder to just build artifacts and stop.
        run: npx electron-builder --${{ matrix.platform }} --publish=never -c electron-builder.yml

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform }}
          # Include .yml + .blockmap so the artifact set is ready for
          # electron-updater later — they're a few KB each and trivial
          # to produce now, painful to regenerate for a past release.
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.yml
            release/*.blockmap
          if-no-files-found: error

  release:
    # Only fire when the workflow was kicked off by a tag push. Manual
    # workflow_dispatch runs stop at the build step — artifacts are
    # available on the run page for smoke-testing.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Checkout needed so we can read CHANGELOG.md for the release body.
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract release notes from CHANGELOG.md
        id: notes
        shell: bash
        run: |
          # Pull out the topmost "## [x.y.z]" section of CHANGELOG.md as
          # the release body. Keep-a-Changelog ordering means "topmost"
          # is always the latest entry — so cutting a release is just
          # "prepend a new ## [x.y.z] section, bump package.json, tag."
          awk '
            /^## \[/ { count++; if (count == 2) exit }
            count == 1 { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No CHANGELOG section found — falling back to auto-generated notes." >&2
            # Empty file is fine — softprops falls back to generate_release_notes.
          fi

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Flatten each platform's artifact directory into the release.
          files: artifacts/**/*
          # Prefer the hand-written CHANGELOG entry as the release body;
          # fall back to GitHub's auto-composed PR-list changelog if the
          # file is empty (e.g. someone forgot to update CHANGELOG.md
          # before tagging).
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          # DRAFT: reviewer has to click "Publish" after sanity-checking
          # that each installer boots. Avoids accidental public releases
          # while the pipeline is young.
          draft: true
